<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}PROPEEP - RR.HH.{% endblock %}</title>
<style>
  :root {
    --primary: #003B6F;
    --primary-light: #005BA5;
    --accent: #E8A020;
    --bg: #F0F4F8;
    --white: #FFFFFF;
    --gray: #6B7280;
    --gray-light: #E5E7EB;
    --danger: #DC2626;
    --success: #16A34A;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #1F2937; min-height: 100vh; }

  /* NAV */
  .navbar {
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 58px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .navbar .brand { font-size: 1.2rem; font-weight: 700; letter-spacing: .5px; display:flex; align-items:center; gap:.6rem; }
  .navbar .brand span.rh { font-size:.85rem; background:var(--accent); color:#000; padding:2px 8px; border-radius:20px; font-weight:600; }
  .navbar .user-info { font-size:.85rem; opacity:.9; display:flex; align-items:center; gap:1rem; }
  .navbar a.logout { color:var(--accent); text-decoration:none; font-weight:600; font-size:.82rem; }
  .navbar a.logout:hover { text-decoration:underline; }

  /* CONTAINER */
  .container { max-width: 1050px; margin: 2rem auto; padding: 0 1rem; }

  /* CARD */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.8rem 2rem;
    margin-bottom: 1.5rem;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--primary);
    border-left: 4px solid var(--accent);
    padding-left: .75rem;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* FORM GRID */
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: .3rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: .82rem; font-weight: 600; color: var(--gray); }
  input[type=text], input[type=date], input[type=email], input[type=number],
  select, textarea {
    border: 1.5px solid var(--gray-light);
    border-radius: 6px;
    padding: .45rem .7rem;
    font-size: .92rem;
    transition: border .2s;
    background: #FAFAFA;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary-light);
    background: #fff;
  }
  input[readonly], input[disabled], select[disabled] {
    background: #EEF2F7;
    color: var(--gray);
    cursor: not-allowed;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    padding: .5rem 1.2rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: .9rem;
    font-weight: 600;
    transition: opacity .2s, transform .1s;
  }
  .btn:hover { opacity: .88; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-accent  { background: var(--accent); color: #000; }
  .btn-danger  { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-outline { background: transparent; border: 1.5px solid var(--primary); color: var(--primary); }
  .btn-sm { padding: .3rem .7rem; font-size: .8rem; }

  /* ALERT */
  .alert {
    padding: .7rem 1rem;
    border-radius: 6px;
    margin-bottom: 1rem;
    font-size: .9rem;
    font-weight: 500;
  }
  .alert-danger  { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
  .alert-success { background: #DCFCE7; color: #166534; border: 1px solid #BBF7D0; }
  .alert-info    { background: #EFF6FF; color: #1E40AF; border: 1px solid #BFDBFE; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th { background: var(--primary); color: #fff; padding: .55rem .8rem; text-align: left; font-weight: 600; }
  td { padding: .5rem .8rem; border-bottom: 1px solid var(--gray-light); vertical-align: middle; }
  tr:hover td { background: #F8FAFC; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff;
    border-radius: var(--radius);
    width: min(560px, 96vw);
    max-height: 90vh;
    overflow-y: auto;
    padding: 1.8rem;
    box-shadow: 0 8px 40px rgba(0,0,0,.25);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
  .modal-title { font-size: 1rem; font-weight: 700; color: var(--primary); }
  .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--gray); line-height: 1; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--primary); color: #fff;
    padding: .75rem 1.4rem;
    border-radius: 8px;
    font-size: .9rem;
    box-shadow: 0 4px 18px rgba(0,0,0,.2);
    z-index: 2000;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity .3s, transform .3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { background: var(--danger); }

  /* TABS NAV */
  .tabs { display: flex; gap: .4rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab-btn {
    padding: .5rem 1.2rem;
    border: 2px solid var(--gray-light);
    border-radius: 6px;
    background: #fff;
    font-weight: 600;
    font-size: .88rem;
    cursor: pointer;
    color: var(--gray);
    transition: all .2s;
  }
  .tab-btn.active { border-color: var(--primary); color: var(--primary); background: #EFF6FF; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>
{% block navbar %}
<nav class="navbar">
  <div class="brand"><img src="/static/Logo_Cupula_PROPEEP.jpg" align="left" width="50" height="50" alt="Logo"><img src="/static/LogoRRHHPropeep.jpg" align="left" width="200" height="50" alt="Logo"> </div>
  {% if session.cedula %}
  <div class="user-info">
    👤 {{ session.nombre }} &nbsp;|&nbsp; <a href="/logout" class="logout">Cerrar sesión</a>
  </div>
  {% endif %}
</nav>
{% endblock %}

{% block content %}{% endblock %}

<div id="toast"></div>
<script>
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (err ? ' error' : '');
  setTimeout(() => t.className = '', 3000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
